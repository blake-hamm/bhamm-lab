ssh_permit_root_login: 'without-password'
ssh_allow_users: ""
ssh_authorized_keys:
  bhamm:
    - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKKsS2H4frdi7AvzkGMPMRaQ+B46Af5oaRFtNJY3uCHt blake.j.hamm@gmail.com
  root:
    - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIKKsS2H4frdi7AvzkGMPMRaQ+B46Af5oaRFtNJY3uCHt blake.j.hamm@gmail.com
network_nameservers:
  - 10.0.9.2
# vars for ansible/roles/proxmox
ntp_enabled: true
ntp_manage_config: true
ntp_area: north-america
ntp_timezone: America/Denver
pve_remove_subscription_warning: false
pve_check_for_kernel_update: true
pve_remove_old_kernels: false
# pve_default_kernel_version: 1.0.1
pve_reboot_on_kernel_update: true
pve_run_system_upgrades: true
pve_cluster_enabled: true
pve_group: proxmox
pve_groups:
  - name: Admins
    comment: Administrators of the PVE cluster
pve_users:
  - name: "{{ ansible_user }}@pam"
    groups: ["Admins"]
  - name: tofu@pve
pve_acls:
  - path: /
    roles: ["Administrator"]
    groups: ["Admins"]
  - path: /
    roles: ["Tofu"]
    users: ["tofu@pve"]
pve_roles:
  - name: Tofu
    privileges:
      - "Datastore.Allocate"
      - "Datastore.AllocateSpace"
      - "Datastore.AllocateTemplate"
      - "Datastore.Audit"
      - "Pool.Allocate"
      - "Sys.Audit"
      - "Sys.Console"
      - "Sys.Modify"
      - "VM.Allocate"
      - "VM.Audit"
      - "VM.Clone"
      - "VM.Config.CDROM"
      - "VM.Config.Cloudinit"
      - "VM.Config.CPU"
      - "VM.Config.Disk"
      - "VM.Config.HWType"
      - "VM.Config.Memory"
      - "VM.Config.Network"
      - "VM.Config.Options"
      - "VM.Migrate"
      - "VM.Console"
      - "VM.PowerMgmt"
      - "SDN.Use"
pve_manage_ssh: false
pve_ssh_port: "{{ ansible_port }}"
pve_zfs_enabled: false
pve_storages:
  - name: lvm
    type: lvm
    content: ["images", "rootdir"]
    vgname: local-vg
#   - name: vms
#     type: zfs # Need to enable this somehow
#     content: [ "images" ]
#     pool: main
#   - name: nfs
#     type: nfs
#     content: ["images", "iso", "backup", "snippets", "vztmpl"]
#     server: 192.168.69.12
#     export: /mnt/storage/proxmox
nut_client_enabled: true
nut_server_host: "10.0.9.3"
nut_ups_name: "cyberpower"
nut_user: "nut-admin"
proxmox_reset_ceph: false
pve_ceph_enabled: true
pve_ceph_network: '10.0.20.0/24'
pve_ceph_cluster_network: '10.0.50.0/24'
# pve_ceph_repository_line: "deb http://download.proxmox.com/debian/ceph-squid bookworm no-subscription"
pve_ceph_crush_rules: [] # Not idempotent upstream
# - name: ssd_rule
#   class: ssd
#   type: host
#   min_size: 1
#   max_size: 10
pve_ceph_pools:
  - name: rbd
    size: 3
    min_size: 2
    pgs: 128
    rule: ssd_rule
    application: rbd
    autoscale_mode: "on"
    storage: true
pve_ceph_fs: []
pve_ceph_rgw_enabled: true
# EC CephFS Configuration
pve_ceph_ecfs_enabled: true
pve_ceph_ecfs_name: cephfs
pve_ceph_ecfs_storage_name: cephfs
pve_ceph_ecfs_content: ["backup", "iso", "vztmpl", "snippets"]
pve_ceph_ecfs_ec_k: 2
pve_ceph_ecfs_ec_m: 1
pve_ceph_ecfs_ec_failure_domain: host
pve_ceph_ecfs_ec_plugin: isa
pve_ceph_ecfs_ec_technique: reed_sol_van
pve_ceph_ecfs_ec_profile_name: ec-2-1-profile
pve_ceph_ecfs_ec_stripe_unit: 16384
pve_ceph_ecfs_ec_pgs: 128
pve_ceph_ecfs_metadata_pgs: 32
pve_ceph_ecfs_backup_pgs: 32
