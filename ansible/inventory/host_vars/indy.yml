network_10gb_nics: [eno7np2, eno8np3]
# Ceph config for proxmox
ceph_nvme_device: /dev/nvme0n1
ceph_partitions:
  - number: 1
    name: osd1_db
    start: 1GiB
    end: 101GiB # 100 GiB for 1TB OSD
  - number: 2
    name: osd2_db
    start: 101GiB
    end: 495GiB # 394 GiB for 3.5TB OSD
    # - number: 3
    #   name: osd3_db
    #   start: 495GiB
    #   end: 931GiB      # ~436 GiB for 7TB OSD
# Proxmox config
pve_ceph_osds:
  - device: /dev/sdd # 1TB
    block.db: /dev/disk/by-id/nvme-Sabrent_Rocket_4.0_Plus_A5CD0712179183364499-part1
    crush.device.class: ssd
  - device: /dev/sdb # 3.5TB
    block.db: /dev/disk/by-id/nvme-Sabrent_Rocket_4.0_Plus_A5CD0712179183364499-part2
    crush.device.class: ssd
  - device: /dev/sda # 7TB (new)
    # block.db: /dev/disk/by-id/nvme-Sabrent_Rocket_4.0_Plus_A5CD0712179183364499-part3
    crush.device.class: ssd
