network_10gb_nics: [eno7np2, eno8np3]
# Use by-id paths — NVMe device numbers shift on reboot
storage_vm_device: /dev/disk/by-id/nvme-Sabrent_Rocket_4.0_Plus_A5CD0712179183364499
ceph_nvme_device: /dev/disk/by-id/nvme-INTEL_SSDPED1K015TA_PHKS8203003F1P5CGN
ceph_partitions:
  - number: 1
    name: osd1_db
    start: 1GiB
    end: 101GiB # 100 GiB for 1TB OSD
  - number: 2
    name: osd2_db
    start: 101GiB
    end: 485GiB # 384 GiB for 3.84TB OSD
  - number: 3
    name: osd3_db
    start: 485GiB
    end: 1185GiB # 700 GiB for 7TB OSD
# Proxmox config
pve_ceph_osds:
  - device: /dev/sdd # 1TB SSD
    block.db: /dev/disk/by-id/nvme-INTEL_SSDPED1K015TA_PHKS8203003F1P5CGN-part1
    crush.device.class: ssd
  - device: /dev/sdc # 3.84TB SSD
    block.db: /dev/disk/by-id/nvme-INTEL_SSDPED1K015TA_PHKS8203003F1P5CGN-part2
    crush.device.class: ssd
  - device: /dev/sdb # 7TB SSD
    block.db: /dev/disk/by-id/nvme-INTEL_SSDPED1K015TA_PHKS8203003F1P5CGN-part3
    crush.device.class: ssd
