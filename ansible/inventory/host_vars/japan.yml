network_10gb_nics: [enp1s0f0, enp1s0f1]
ceph_nvme_device: /dev/nvme1n1
ceph_partitions:
  - number: 1
    name: osd1_db
    start: 1GiB
    end: 101GiB
  - number: 2
    name: osd2_db
    start: 101GiB
    end: 201GiB
  - number: 3
    name: osd3_db
    start: 201GiB
    end: 585GiB
pve_ceph_osds:
  # OSD 1: 3.5TB (sdd) → needs largest DB → part3 (384GiB ≈ 11%)
  - device: /dev/sdd
    block.db: /dev/disk/by-id/nvme-WD_BLACK_SN850X_1000GB_25286M804502-part3
    crush.device.class: ssd
  # OSD 2: 1TB (sde) → part1 (100GiB ≈ 10%)
  - device: /dev/sde
    block.db: /dev/disk/by-id/nvme-WD_BLACK_SN850X_1000GB_25286M804502-part1
    crush.device.class: ssd
  # OSD 3: 1TB (sdf) → part2 (100GiB ≈ 10%)
  - device: /dev/sdf
    block.db: /dev/disk/by-id/nvme-WD_BLACK_SN850X_1000GB_25286M804502-part2
    crush.device.class: ssd
pve_pcie_passthrough_enabled: true
pve_iommu_passthrough_mode: true
pve_iommu_unsafe_interrupts: false
pve_pcie_ovmf_enabled: false
pve_pci_device_ids:
  - id: "1000:0097" # Broadcom / LSI SAS3008
pve_vfio_blacklist_drivers:
  - name: "mpt3sas"
