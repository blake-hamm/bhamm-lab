- name: Downloading cilium CLI archive
  ansible.builtin.get_url:
    url: "{{ k3s_cilium_cli_url }}"
    dest: "/tmp/{{ k3s_cilium_cli_archive }}"
    checksum: "sha256:{{ k3s_cilium_cli_url }}.sha256sum"
    mode: "0600"
- name: Unarchive cilium CLI
  ansible.builtin.unarchive:
    src: "/tmp/{{ k3s_cilium_cli_archive }}"
    dest: "/tmp"
    remote_src: true
- name: Copy cilium cli binary to destination directory
  ansible.builtin.copy:
    src: "/tmp/cilium"
    dest: "/usr/local/bin/cilium"
    mode: "0755"
    owner: "root"
    group: "root"
    remote_src: true
- name: Check if Cilium is already installed and healthy
  ansible.builtin.command:
    cmd: cilium status --wait --wait-duration 45s
  environment:
    KUBECONFIG: "/etc/rancher/k3s/k3s.yaml"
  register: cilium_status_check
  ignore_errors: true
  changed_when: false
- name: Template cilium-values.yaml
  ansible.builtin.template:
    src: cilium-values.yaml
    dest: /tmp/cilium-values.yaml
    mode: '0600'
  register: templated_values
- name: Install Cilium CNI (only if not healthy)
  ansible.builtin.command:
    cmd: cilium install --values /tmp/cilium-values.yaml
  environment:
    KUBECONFIG: "/etc/rancher/k3s/k3s.yaml"
  when: cilium_status_check is failed
  changed_when: false
- name: Upgrade Cilium CNI
  ansible.builtin.command:
    cmd: cilium upgrade --values /tmp/cilium-values.yaml
  environment:
    KUBECONFIG: "/etc/rancher/k3s/k3s.yaml"
  when: not cilium_status_check is failed
  changed_when: false
