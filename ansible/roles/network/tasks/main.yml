# tasks file for network
- name: Run pre tasks
  ansible.builtin.include_tasks:
    file: pre.yml
    apply:
      become: true
- name: Disable ipv6
  ansible.builtin.copy:
    src: 99-disable-ipv6.conf
    dest: /etc/sysctl.d/99-disable-ipv6.conf
    mode: "644"
  become: true
  notify: Restart network
- name: Setup network interface
  ansible.builtin.template:
    src: "network/{{ inventory_hostname }}.j2"
    dest: /etc/network/interfaces
    mode: "644"
  become: true
  notify: Restart network
- name: Purge dynamic DNS managers to prevent resolv.conf overwrites
  ansible.builtin.apt:
    name:
      - resolvconf
      - isc-dhcp-client
      - dhcpcd5
      - dhcpcd
      - systemd-resolved
    state: absent
    purge: true
  become: true
- name: Disable systemd-resolved (if present)
  ansible.builtin.systemd:
    name: systemd-resolved
    state: stopped
    enabled: false
  become: true
  ignore_errors: true
- name: Write static /etc/resolv.conf
  ansible.builtin.copy:
    dest: /etc/resolv.conf
    content: |
      nameserver {{ network_nameservers | first }}
      search localdomain
    mode: "0644"
    owner: root
    group: root
  become: true
- name: Optimize 10g nics
  ansible.builtin.include_tasks:
    file: nic.yml
    apply:
      become: true
