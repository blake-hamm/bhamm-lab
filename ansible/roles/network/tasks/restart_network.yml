- name: Reload and restart network
  become: true
  block:
    - name: Ensure rt_tables.d directory exists for ifupdown2 bug in Debian 13
      ansible.builtin.file:
        path: /etc/iproute2/rt_tables.d
        state: directory
        mode: "0755"
        owner: root
        group: root
    - name: Reload network interfaces
      ansible.builtin.command: ifreload -a
      changed_when: false
    - name: Restart networking service
      ansible.builtin.systemd:
        name: networking
        state: restarted
        enabled: true
