# swap.yml
- name: Disable all swap devices
  ansible.builtin.command:
    cmd: swapoff -a
  changed_when: false
- name: Get current swap LV size
  ansible.builtin.command:
    cmd: lvs --noheadings -o lv_size --units g --nosuffix {{ storage_root_vg }}/swap_1
  register: storage_swap_lv_size
  changed_when: false
  failed_when: false
- name: Remove existing swap LV
  community.general.lvol:
    vg: "{{ storage_root_vg }}"
    lv: swap_1
    state: absent
    force: true
  when:
    - storage_swap_lv_size.rc == 0
    - storage_swap_lv_size.stdout | trim | float != storage_swap_size | regex_replace('[gG]', '') | float
- name: Create swap LV at target size
  community.general.lvol:
    vg: "{{ storage_root_vg }}"
    lv: swap_1
    size: "{{ storage_swap_size }}"
    state: present
  when:
    - storage_swap_lv_size.rc != 0 or storage_swap_lv_size.stdout | trim | float != storage_swap_size | regex_replace('[gG]', '') | float
- name: Update /etc/fstab swap entry
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: "{{ storage_old_swap | regex_escape }}"
    replace: "{{ storage_new_swap }}"
  notify: Update fstab and GRUB
- name: Ensure resume hook points to new swap LV
  ansible.builtin.copy:
    dest: /etc/initramfs-tools/conf.d/resume
    content: |
      RESUME={{ storage_new_swap }}
    owner: root
    group: root
    mode: '0644'
  notify: Update initramfs
- name: Reinitialize swap signature on LV
  ansible.builtin.command:
    cmd: mkswap "{{ storage_new_swap }}"
  changed_when: false
- name: Ensure correct swap LV entry in /etc/fstab
  ansible.posix.mount:
    path: none
    src: "{{ storage_new_swap }}"
    fstype: swap
    opts: sw
    state: present
- name: Reload systemd to pick up fstab changes
  ansible.builtin.systemd:
    daemon_reload: true
- name: Enable all swap devices
  ansible.builtin.command:
    cmd: swapon -a
  changed_when: false
