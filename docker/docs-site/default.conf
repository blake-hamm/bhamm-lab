# default.conf
server {
    listen 8080;
    root /usr/share/nginx/html/docs;  # Explicit subdirectory

    location / {
        try_files $uri $uri/ /index.html;
        add_header Content-Type text/html;
    }

    location ~* \.css$ {
        add_header Content-Type text/css;
    }

    location ~* \.js$ {
        add_header Content-Type application/javascript;
    }
}