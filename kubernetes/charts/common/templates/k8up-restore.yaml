{{- if .Values.k8up.restore.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: {{ .Values.name }}-onsite-restore
  namespace: {{ .Values.name }}
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  ttlStrategy:
    secondsAfterSuccess: 0
    secondsAfterFailure: 0
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: full-k8up-restore
            templateRef:
              name: manage-k8up
              template: full-k8up-restore
              clusterScope: true
            arguments:
              parameters:
                - name: target-namespace
                  value: {{ .Values.name | quote }}
                - name: location
                  value: onsite
                - name: k8up-endpoint
                  value: {{ .Values.s3.endpoint | quote }}
                - name: k8up-bucket
                  value: k8up-backups
                - name: k8up-secret
                  value: k8up
                - name: fsGroup
                  value: {{ .Values.k8up.restore.config.fsGroup | quote }}
{{- end }}