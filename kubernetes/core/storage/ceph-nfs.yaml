apiVersion: ceph.rook.io/v1
kind: CephNFS
metadata:
  name: ceph-external-nfs
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
spec:
  server:
    active: 1
---
apiVersion: v1
kind: Service
metadata:
  name: ceph-external-nfs
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-80"
spec:
  ports:
    - name: nfs
      port: 2049
      protocol: TCP
      targetPort: 2049
  selector:
    app: ceph-external-nfs
  type: LoadBalancer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: rook-ceph-tools-exec-role
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-70"
rules:
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["get", "create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: rook-ceph-tools-exec-binding
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-60"
subjects:
  - kind: ServiceAccount
    name: default
    namespace: rook-ceph
roleRef:
  kind: Role
  name: rook-ceph-tools-exec-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-external-nfs-export-job
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-wave: "-50"
spec:
  template:
    spec:
      containers:
        - name: ceph-external-nfs-export
          image: bitnami/kubectl:latest
          command:
            - /bin/sh
            - -c
            - |
              kubectl exec -n rook-ceph rook-ceph-tools -- ceph nfs export create cephfs ceph-external-nfs /test ceph-filesystem
      restartPolicy: OnFailure
