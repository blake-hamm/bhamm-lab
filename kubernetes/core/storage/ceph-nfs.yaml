apiVersion: ceph.rook.io/v1
kind: CephNFS
metadata:
  name: ceph-external-nfs
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-100"
spec:
  server:
    active: 1
---
apiVersion: v1
kind: Service
metadata:
  name: ceph-external-nfs
  namespace: rook-ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-80"
spec:
  ports:
    - name: nfs
      port: 2049
      protocol: TCP
      targetPort: 2049
  selector:
    app: ceph-external-nfs
  type: LoadBalancer
