# Standalone workflow to restore Ceph RGW buckets from garage.
# Run this after seaweedfs-restore-all (which restores r2 -> garage).
# This skips r2->garage and goes directly garage->rgw.
apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: restore-ceph-rgw-green
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  serviceAccountName: argo-workflow
  entrypoint: restore-chain
  ttlStrategy:
    secondsAfterCompletion: 86400
    secondsAfterSuccess: 86400
    secondsAfterFailure: 604800
  templates:
    - name: restore-chain
      steps:
        - - name: garage-to-rgw
            templateRef:
              name: create-ceph-buckets-green
              template: restore-from-garage-to-rgw
              clusterScope: true
