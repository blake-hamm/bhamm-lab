apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: searxng-common
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "18"
spec:
  destination:
    namespace: searxng
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/blake-hamm/bhamm-lab.git
    targetRevision: main
    path: kubernetes/charts/common
    helm:
      valuesObject:
        name: searxng
        ingressRoutes:
          - name: searxng
            ingressClass: traefik-external
            routes:
              - match: Host(`searxng.bhamm-lab.com`)
                kind: Rule
                middlewares:
                  - name: default-headers
                  - name: forwardauth-authelia
                services:
                  - name: searxng
                    scheme: http
                    port: http
        dragonfly:
          enabled: true
        externalSecrets:
          enabled: true
          secrets:
            - secretKey: SEARXNG_SECRET
              remoteRef:
                key: /default/searxng
                property: SEARXNG_SECRET
            - secretKey: SEARXNG_OPEN_METRICS
              remoteRef:
                key: /default/searxng
                property: smon_username
            - secretKey: smon_username
              remoteRef:
                key: /default/searxng
                property: smon_username
            - secretKey: BRAVE_API_KEY
              remoteRef:
                key: /external/brave
                property: BRAVE_API_KEY
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
