apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: searxng
  annotations:
    argocd.argoproj.io/sync-wave: "20"
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      initContainers:
        - name: envsubst
          image: bhgedigital/envsubst:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              envsubst < /config/settings.yml > /etc/searxng/settings.yml
              cp /config/limiter.toml /etc/searxng/limiter.toml
          env:
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: searxng-external-secret
                  key: BRAVE_API_KEY
          volumeMounts:
            - name: config
              mountPath: /config
            - name: templated-config
              mountPath: /etc/searxng
      containers:
        - name: searxng
          image: ghcr.io/searxng/searxng:2026.5.25-28ef4f744
          ports:
            - containerPort: 8080
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 1
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 1
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
          volumeMounts:
            - name: templated-config
              mountPath: /etc/searxng
            - name: data
              mountPath: /var/cache/searxng
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          env:
            - name: TZ
              value: "America/Denver"
            - name: SEARXNG_SECRET
              valueFrom:
                secretKeyRef:
                  name: searxng-external-secret
                  key: SEARXNG_SECRET
            - name: SEARXNG_OPEN_METRICS
              valueFrom:
                secretKeyRef:
                  name: searxng-external-secret
                  key: SEARXNG_OPEN_METRICS
            - name: SEARXNG_PORT
              value: "8080"
            - name: GRANIAN_PORT
              value: "8080"
      volumes:
        - name: config
          configMap:
            name: searxng-config
        - name: templated-config
          emptyDir: {}
        - name: data
          emptyDir: {}
      nodeSelector:
        feature.node.kubernetes.io/amd-gpu: "true"
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
