apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ceph-csi-rbd
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-6"
spec:
  destination:
    namespace: ceph
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: ceph-csi-rbd
    repoURL: https://ceph.github.io/csi-charts
    targetRevision: 3.13.1
    helm:
      valuesObject:
        nodeplugin:
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        provisioner:
          replicaCount: 3
          enableHostNetwork: false
          tolerations:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
              effect: NoSchedule
        csiConfig:
          - clusterID: "7b02e4a9-b740-4d5a-b519-9585725a55fb"
            monitors:
              - "10.0.20.11:3300"
              - "10.0.20.12:3300"
              - "10.0.20.13:3300"
        cephconf: |
          # minimal ceph.conf for 7b02e4a9-b740-4d5a-b519-9585725a55fb
          [global]
            fsid = 7b02e4a9-b740-4d5a-b519-9585725a55fb
            mon_host = [v2:10.0.20.12:3300/0,v1:10.0.20.12:6789/0] [v2:10.0.20.11:3300/0,v1:10.0.20.11:6789/0] [v2:10.0.20.13:3300/0,v1:10.0.20.13:6789/0]
            auth_cluster_required = cephx
            auth_service_required = cephx
            auth_client_required = cephx
        storageClass:
          create: true
          name: csi-rbd-sc
          annotations:
            storageclass.kubernetes.io/is-default-class: "true"
          clusterID: "7b02e4a9-b740-4d5a-b519-9585725a55fb"
          pool: kubernetes
          mountOptions:
            - discard
          tryOtherMounters: true
        configMapName: ceph-rbd-csi-config
        cephConfConfigMapName: ceph-rbd-config
        kmsConfigMapName: ceph-rbd-csi-encryption-kms-config
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
