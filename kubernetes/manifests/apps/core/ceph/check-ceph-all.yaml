apiVersion: v1
kind: ServiceAccount
metadata:
  name: ceph-check-sa
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ceph-check-role
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ceph-check-binding
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-9"
roleRef:
  kind: Role
  name: ceph-check-role
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: ceph-check-sa
    namespace: ceph
---
apiVersion: batch/v1
kind: Job
metadata:
  name: ceph-check-job
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "-8"
spec:
  backoffLimit: 0
  activeDeadlineSeconds: 600
  template:
    spec:
      serviceAccountName: ceph-check-sa
      containers:
        - name: readiness-check
          image: bitnami/kubectl:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              max_retries=120  # 120 * 5s = 10 minutes total
              for i in $(seq 1 $max_retries); do
                if kubectl get pods -n ceph -l app=ceph-csi-rbd \
                  -o jsonpath='{.items[*].status.containerStatuses[0].ready}' | grep -q "true"; then
                  echo "Ceph CSI pods are ready"
                  exit 0
                fi
                echo "Waiting for Ceph CSI pods to be ready... (attempt $i/$max_retries)"
                sleep 5
              done
              echo "Timeout: Ceph CSI pods not ready after $max_retries attempts"
              exit 1
      restartPolicy: OnFailure
