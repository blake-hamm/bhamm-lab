apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argo-workflows
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  destination:
    namespace: argo
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: argo-workflows
    repoURL: https://argoproj.github.io/argo-helm
    targetRevision: 1.0.8
    helm:
      valuesObject:
        workflow:
          serviceAccount:
            create: true
          rbac:
            artifactGC: true
        controller:
          parallelism: 10
          workflowTTLWorkers: 32
          metricsConfig:
            enabled: true
          serviceMonitor:
            enabled: true
            additionalLabels:
              release: monitor
          workflowDefaults:
            spec:
              serviceAccountName: argo-workflow
              ttlStrategy:
                secondsAfterSuccess: 3600
                secondsAfterFailure: 86400
              artifactGC:
                strategy: OnWorkflowDeletion
                serviceAccountName: argo-workflow
          workflowNamespaces:
            - argo
        server:
          authModes:
            - sso
          sso:
            enabled: false
            # issuer: https://auth.bhamm-lab.com
            # clientId:
            #   name: argo-external-secret
            #   key: client-id
            # clientSecret:
            #   name: argo-external-secret
            #   key: client-secret
            # redirectUrl: "https://argo.bhamm-lab.com/oauth2/callback"
            # rbac:
            #   enabled: false
            #   secretWhitelist: []
            # scopes:
            #   - 'openid'
            #   - 'groups'
            #   - 'email'
            #   - 'profile'
            # sessionExpiry: ""
            # issuerAlias: ""
            # customGroupClaimName: ""
            # userInfoPath: ""
            # insecureSkipVerify: false
            # filterGroupsRegex:
        artifactRepository:
          s3:
            endpoint: "external-rgw.ceph.svc.cluster.local:80"
            insecure: true
            bucket: argo-artifacts
            accessKeySecret:
              name: argo-external-secret
              key: s3_access_key
            secretKeySecret:
              name: argo-external-secret
              key: s3_secret_key
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 10
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 5m
