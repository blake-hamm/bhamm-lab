apiVersion: argoproj.io/v1alpha1
kind: ClusterWorkflowTemplate
metadata:
  name: create-ceph-buckets-green
  annotations:
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
    argocd.argoproj.io/sync-wave: "8"
spec:
  serviceAccountName: argo-workflow
  entrypoint: main
  templates:
    - name: main
      steps:
        - - name: create-buckets
            template: bucket-management
            arguments:
              parameters:
                - name: bucket-names
                  value: '["tofu-state","loki-data","argo-artifacts","cnpg-backups","k8up-backups", "beyond-vibes", "mlflow", "proxmox-backup-server"]'
                - name: endpoint-url
                  value: http://external-rgw.ceph.svc.cluster.local:80
                - name: aws-region
                  value: us-east-1
                - name: destroy-and-create
                  value: "true"
                - name: aws-auth-secret
                  value: ceph-external-secret
                - name: aws-access-key-id
                  value: s3_access_key
                - name: aws-secret-access-key
                  value: s3_secret_key
    - name: bucket-management
      inputs:
        parameters:
          - name: bucket-names
          - name: endpoint-url
          - name: aws-region
          - name: destroy-and-create
          - name: aws-auth-secret
          - name: aws-access-key-id
          - name: aws-secret-access-key
      steps:
        - - name: optionally-destroy
            when: "{{inputs.parameters.destroy-and-create}}"
            template: destroy-bucket
            arguments:
              parameters:
                - name: bucket-name
                  value: "{{item}}"
                - name: endpoint-url
                  value: "{{inputs.parameters.endpoint-url}}"
                - name: aws-region
                  value: "{{inputs.parameters.aws-region}}"
                - name: aws-auth-secret
                  value: "{{inputs.parameters.aws-auth-secret}}"
                - name: aws-access-key-id
                  value: "{{inputs.parameters.aws-access-key-id}}"
                - name: aws-secret-access-key
                  value: "{{inputs.parameters.aws-secret-access-key}}"
            withParam: "{{inputs.parameters.bucket-names}}"
        - - name: create-bucket
            template: create-bucket
            arguments:
              parameters:
                - name: bucket-name
                  value: "{{item}}"
                - name: endpoint-url
                  value: "{{inputs.parameters.endpoint-url}}"
                - name: aws-region
                  value: "{{inputs.parameters.aws-region}}"
                - name: aws-auth-secret
                  value: "{{inputs.parameters.aws-auth-secret}}"
                - name: aws-access-key-id
                  value: "{{inputs.parameters.aws-access-key-id}}"
                - name: aws-secret-access-key
                  value: "{{inputs.parameters.aws-secret-access-key}}"
            withParam: "{{inputs.parameters.bucket-names}}"
    - name: destroy-bucket
      inputs:
        parameters:
          - name: bucket-name
          - name: endpoint-url
          - name: aws-region
          - name: aws-auth-secret
          - name: aws-access-key-id
          - name: aws-secret-access-key
      container:
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
          - name: ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.aws-auth-secret}}"
                key: "{{inputs.parameters.aws-access-key-id}}"
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.aws-auth-secret}}"
                key: "{{inputs.parameters.aws-secret-access-key}}"
          - name: ENDPOINT_URL
            value: "{{inputs.parameters.endpoint-url}}"
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Attempting to remove bucket: {{inputs.parameters.bucket-name}} from $ENDPOINT_URL"
            mc alias set ceph $ENDPOINT_URL $ACCESS_KEY $SECRET_KEY
            mc rb --force ceph/{{inputs.parameters.bucket-name}} || echo "Bucket did not exist or was already empty"
    - name: create-bucket
      inputs:
        parameters:
          - name: bucket-name
          - name: endpoint-url
          - name: aws-region
          - name: aws-auth-secret
          - name: aws-access-key-id
          - name: aws-secret-access-key
      container:
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        env:
          - name: ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.aws-auth-secret}}"
                key: "{{inputs.parameters.aws-access-key-id}}"
          - name: SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: "{{inputs.parameters.aws-auth-secret}}"
                key: "{{inputs.parameters.aws-secret-access-key}}"
          - name: ENDPOINT_URL
            value: "{{inputs.parameters.endpoint-url}}"
        command: ["/bin/sh", "-c"]
        args:
          - |
            echo "Checking if bucket {{inputs.parameters.bucket-name}} already exists"
            mc alias set ceph $ENDPOINT_URL $ACCESS_KEY $SECRET_KEY
            if mc ls ceph/{{inputs.parameters.bucket-name}} >/dev/null 2>&1; then
              echo "Bucket already exists. Skipping creation."
            else
              echo "Creating new bucket: {{inputs.parameters.bucket-name}} at $ENDPOINT_URL"
              mc mb ceph/{{inputs.parameters.bucket-name}}
            fi
    - name: restore-from-r2-to-garage
      steps:
        - - name: sync-r2-to-garage
            template: sync-r2-to-garage
        - - name: verify-garage
            template: verify-garage
    - name: sync-r2-to-garage
      container:
        image: rclone/rclone
        resources:
          requests:
            memory: 512Mi
          limits:
            memory: 4Gi
        env:
          - name: R2_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_ACCESS_KEY_ID
          - name: R2_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_SECRET_ACCESS_KEY
          - name: R2_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_ENDPOINT
          - name: GARAGE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_access_key
          - name: GARAGE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_secret_key
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -ex
            rclone config create r2 s3 \
              provider Cloudflare \
              access_key_id $R2_ACCESS_KEY_ID \
              secret_access_key $R2_SECRET_ACCESS_KEY \
              endpoint $R2_ENDPOINT

            rclone config create garage s3 \
              provider Other \
              access_key_id $GARAGE_ACCESS_KEY_ID \
              secret_access_key $GARAGE_SECRET_ACCESS_KEY \
              endpoint http://external-garage.garage.svc.cluster.local:80 \
              force_path_style true \
              region garage

            echo "=== Syncing r2:ceph-rgw → garage:ceph-rgw ==="
            rclone sync r2:ceph-rgw garage:ceph-rgw \
              --progress \
              --fast-list \
              --checksum \
              --check-first \
              --transfers=16 \
              --checkers=32 \
              --s3-chunk-size=16M \
              --s3-upload-concurrency=8 \
              --s3-no-head \
              --s3-no-check-bucket \
              --disable-http2 \
              --max-backlog=10000 \
              --stats=30s
    - name: verify-garage
      container:
        image: rclone/rclone
        resources:
          requests:
            memory: 256Mi
          limits:
            memory: 1Gi
        env:
          - name: R2_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_ACCESS_KEY_ID
          - name: R2_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_SECRET_ACCESS_KEY
          - name: R2_ENDPOINT
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: R2_ENDPOINT
          - name: GARAGE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_access_key
          - name: GARAGE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_secret_key
        command: ["/bin/sh", "-c"]
        args:
          - |
            rclone config create r2 s3 \
              provider Cloudflare \
              access_key_id $R2_ACCESS_KEY_ID \
              secret_access_key $R2_SECRET_ACCESS_KEY \
              endpoint $R2_ENDPOINT

            rclone config create garage s3 \
              provider Other \
              access_key_id $GARAGE_ACCESS_KEY_ID \
              secret_access_key $GARAGE_SECRET_ACCESS_KEY \
              endpoint http://external-garage.garage.svc.cluster.local:80 \
              force_path_style true \
              region garage

            echo "=== Verification: r2:ceph-rgw vs garage:ceph-rgw ==="
            rclone check r2:ceph-rgw garage:ceph-rgw --one-way --checksum
    - name: restore-from-garage-to-rgw
      steps:
        - - name: list-garage-buckets
            template: list-garage-buckets
        - - name: create-rgw-buckets
            template: bucket-management
            arguments:
              parameters:
                - name: bucket-names
                  value: "{{steps.list-garage-buckets.outputs.result}}"
                - name: endpoint-url
                  value: http://external-rgw.ceph.svc.cluster.local:80
                - name: aws-region
                  value: us-east-1
                - name: destroy-and-create
                  value: "false"
                - name: aws-auth-secret
                  value: ceph-external-secret
                - name: aws-access-key-id
                  value: s3_access_key
                - name: aws-secret-access-key
                  value: s3_secret_key
        - - name: restore-bucket
            template: restore-bucket-from-garage
            arguments:
              parameters:
                - name: bucket
                  value: "{{item}}"
            withParam: "{{steps.list-garage-buckets.outputs.result}}"
        - - name: verify-restore
            template: verify-rgw
    - name: list-garage-buckets
      container:
        image: rclone/rclone
        resources:
          requests:
            memory: 128Mi
          limits:
            memory: 256Mi
        env:
          - name: GARAGE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_access_key
          - name: GARAGE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_secret_key
        command: ["/bin/sh", "-c"]
        args:
          - |
            rclone config create garage s3 \
              provider Other \
              access_key_id $GARAGE_ACCESS_KEY_ID \
              secret_access_key $GARAGE_SECRET_ACCESS_KEY \
              endpoint http://external-garage.garage.svc.cluster.local:80 \
              force_path_style true \
              region garage >&2
            rclone lsf garage:ceph-rgw | awk -F/ '{a[$1]} END{for(i in a) print i}' | sort | awk 'BEGIN{s="["; sep=""} {s=s sep"\""$0"\""; sep=","} END{print s"]"}'
    - name: restore-bucket-from-garage
      inputs:
        parameters:
          - name: bucket
      container:
        image: rclone/rclone
        resources:
          requests:
            memory: 512Mi
          limits:
            memory: 4Gi
        env:
          - name: RGW_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: s3_access_key
          - name: RGW_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: s3_secret_key
          - name: GARAGE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_access_key
          - name: GARAGE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_secret_key
          - name: BUCKET
            value: "{{inputs.parameters.bucket}}"
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -ex
            rclone config create rgw s3 \
              provider Ceph \
              access_key_id $RGW_ACCESS_KEY \
              secret_access_key $RGW_SECRET_KEY \
              endpoint http://external-rgw.ceph.svc.cluster.local:80

            rclone config create garage s3 \
              provider Other \
              access_key_id $GARAGE_ACCESS_KEY_ID \
              secret_access_key $GARAGE_SECRET_ACCESS_KEY \
              endpoint http://external-garage.garage.svc.cluster.local:80 \
              force_path_style true \
              region garage

            echo "=== Restoring garage:ceph-rgw/${BUCKET} -> rgw:${BUCKET} ==="
            rclone sync "garage:ceph-rgw/${BUCKET}" "rgw:${BUCKET}" \
              --progress \
              --fast-list \
              --transfers=8 \
              --checkers=16 \
              --disable-http2 \
              --stats=30s
    - name: verify-rgw
      container:
        image: rclone/rclone
        resources:
          requests:
            memory: 256Mi
          limits:
            memory: 1Gi
        env:
          - name: RGW_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: s3_access_key
          - name: RGW_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: s3_secret_key
          - name: GARAGE_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_access_key
          - name: GARAGE_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: ceph-external-secret
                key: garage_s3_secret_key
        command: ["/bin/sh", "-c"]
        args:
          - |
            rclone config create rgw s3 \
              provider Ceph \
              access_key_id $RGW_ACCESS_KEY \
              secret_access_key $RGW_SECRET_KEY \
              endpoint http://external-rgw.ceph.svc.cluster.local:80

            rclone config create garage s3 \
              provider Other \
              access_key_id $GARAGE_ACCESS_KEY_ID \
              secret_access_key $GARAGE_SECRET_ACCESS_KEY \
              endpoint http://external-garage.garage.svc.cluster.local:80 \
              force_path_style true \
              region garage

            echo "=== Verification: Checking restore integrity ==="
            for bucket in $(rclone lsf garage:ceph-rgw | awk -F/ '{a[$1]} END{for(i in a) print i}' | sort); do
              echo "--- Checking rgw:${bucket} ---"
              rclone check "garage:ceph-rgw/${bucket}" "rgw:${bucket}" --one-way --size-only
            done
