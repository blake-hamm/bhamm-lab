apiVersion: argoproj.io/v1alpha1
kind: CronWorkflow
metadata:
  name: ceph-rgw-backup
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "25"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  schedules:
    - "0 1 * * 0"
  timezone: America/Denver
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  workflowSpec:
    serviceAccountName: argo-workflow
    entrypoint: main
    templates:
      - name: main
        steps:
          - - name: list-buckets
              template: list-buckets
          - - name: rclone-sync-to-garage
              template: rclone-sync-to-garage
              arguments:
                parameters:
                  - name: buckets
                    value: "{{steps.list-buckets.outputs.result}}"
          - - name: rclone-sync-to-r2
              template: rclone-sync-to-r2
      - name: list-buckets
        container:
          image: rclone/rclone
          env:
            - name: RGW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: s3_access_key
            - name: RGW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: s3_secret_key
          command: ["/bin/sh", "-c"]
          args:
            - |
              rclone config create rgw s3 \
                provider Ceph \
                access_key_id $RGW_ACCESS_KEY \
                secret_access_key $RGW_SECRET_KEY \
                endpoint http://external-rgw.ceph.svc.cluster.local:80 >&2
              rclone lsd rgw: --fast-list | awk '{print $NF}' | tr '\n' ' '
      - name: rclone-sync-to-garage
        inputs:
          parameters:
            - name: buckets
        container:
          image: rclone/rclone
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
          env:
            - name: RGW_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: s3_access_key
            - name: RGW_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: s3_secret_key
            - name: GARAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_access_key
            - name: GARAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_secret_key
            - name: BUCKETS
              value: "{{inputs.parameters.buckets}}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -ex
              rclone config create rgw s3 \
                provider Other \
                access_key_id $RGW_ACCESS_KEY \
                secret_access_key $RGW_SECRET_KEY \
                endpoint http://external-rgw.ceph.svc.cluster.local:80

              rclone config create garage s3 \
                provider Other \
                access_key_id $GARAGE_ACCESS_KEY_ID \
                secret_access_key $GARAGE_SECRET_ACCESS_KEY \
                endpoint http://external-garage.garage.svc.cluster.local:80

              for bucket in $BUCKETS; do
                echo "=== Syncing rgw:${bucket} → garage:ceph-rgw/${bucket}/ ==="
                rclone sync "rgw:${bucket}" "garage:ceph-rgw/${bucket}" \
                  --progress \
                  --fast-list \
                  --checksum \
                  --check-first \
                  --transfers=16 \
                  --checkers=32 \
                  --s3-chunk-size=16M \
                  --s3-upload-concurrency=8 \
                  --s3-no-head \
                  --s3-no-check-bucket \
                  --disable-http2 \
                  --max-backlog=10000 \
                  --stats=30s
              done

              echo "=== Verification: Garage bucket contents ==="
              rclone ls garage:ceph-rgw
      - name: rclone-sync-to-r2
        container:
          image: rclone/rclone
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
          env:
            - name: GARAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_access_key
            - name: GARAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_secret_key
            - name: R2_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: R2_ACCESS_KEY_ID
            - name: R2_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: R2_SECRET_ACCESS_KEY
            - name: R2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: R2_ENDPOINT
          command: ["/bin/sh", "-c"]
          args:
            - |-
              set -ex
              rclone config create garage s3 \
                provider Other \
                access_key_id $GARAGE_ACCESS_KEY_ID \
                secret_access_key $GARAGE_SECRET_ACCESS_KEY \
                endpoint http://external-garage.garage.svc.cluster.local:80

              rclone config create r2 s3 \
                provider Cloudflare \
                access_key_id $R2_ACCESS_KEY_ID \
                secret_access_key $R2_SECRET_ACCESS_KEY \
                endpoint $R2_ENDPOINT

              echo "=== Syncing garage:ceph-rgw → r2:ceph-rgw ==="
              rclone sync garage:ceph-rgw r2:ceph-rgw \
                --progress \
                --fast-list \
                --checksum \
                --check-first \
                --transfers=16 \
                --checkers=32 \
                --s3-chunk-size=16M \
                --s3-upload-concurrency=4 \
                --s3-no-head \
                --s3-no-check-bucket \
                --disable-http2 \
                --max-backlog=10000 \
                --stats=30s

              echo "=== Verification: Checking sync integrity ==="
              rclone check garage:ceph-rgw r2:ceph-rgw --one-way --checksum
      - name: rclone-sync-to-b2
        container:
          image: rclone/rclone
          resources:
            requests:
              memory: 512Mi
            limits:
              memory: 4Gi
          env:
            - name: GARAGE_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_access_key
            - name: GARAGE_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: garage_s3_secret_key
            - name: B2_APPLICATION_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: B2_APPLICATION_KEY_ID
            - name: B2_APPLICATION_KEY
              valueFrom:
                secretKeyRef:
                  name: ceph-external-secret
                  key: B2_APPLICATION_KEY
          command: ["/bin/sh", "-c"]
          args:
            - |-
              set -ex
              rclone config create garage s3 \
                provider Other \
                access_key_id $GARAGE_ACCESS_KEY_ID \
                secret_access_key $GARAGE_SECRET_ACCESS_KEY \
                endpoint http://external-garage.garage.svc.cluster.local:80

              rclone config create b2 b2 \
                account $B2_APPLICATION_KEY_ID \
                key $B2_APPLICATION_KEY

              echo "=== Syncing garage:ceph-rgw → b2:bhamm-lab-ceph-rgw ==="
              rclone sync garage:ceph-rgw b2:bhamm-lab-ceph-rgw \
                --progress \
                --fast-list \
                --check-first \
                --transfers=32 \
                --checkers=32 \
                --b2-chunk-size=96M \
                --b2-upload-concurrency=4 \
                --max-backlog=10000 \
                --stats=30s

              echo "=== Verification: Checking sync integrity ==="
              rclone check garage:ceph-rgw b2:bhamm-lab-ceph-rgw --one-way
