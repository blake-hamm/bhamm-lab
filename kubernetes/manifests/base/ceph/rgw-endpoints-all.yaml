apiVersion: v1
kind: Service
metadata:
  name: external-rgw
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "7"
spec:
  ports:
    - name: s3
      port: 80
      targetPort: 7480
      protocol: TCP
---
apiVersion: v1
kind: Endpoints
metadata:
  name: external-rgw
  namespace: ceph
  annotations:
    argocd.argoproj.io/sync-wave: "7"
subsets:
  - addresses:
      - ip: 10.0.20.11
      - ip: 10.0.20.12
      - ip: 10.0.20.15
    ports:
      - name: s3
        port: 7480
        protocol: TCP
