apiVersion: apps/v1
kind: Deployment
metadata:
  name: opnsense-exporter
  namespace: monitor
  annotations:
    argocd.argoproj.io/sync-wave: "21"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: opnsense-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opnsense-exporter
    spec:
      containers:
        - name: exporter
          image: ghcr.io/athennamind/opnsense-exporter:0.0.15
          args:
            - --web.listen-address=:8080
            - --web.telemetry-path=/metrics
            - --exporter.instance-label=opnsense
          env:
            - name: OPNSENSE_EXPORTER_OPS_PROTOCOL
              value: "https"
            - name: OPNSENSE_EXPORTER_OPS_API
              value: "10.0.9.1"
            - name: OPNSENSE_EXPORTER_OPS_INSECURE
              value: "true"
          envFrom:
            - secretRef:
                name: monitor-external-secret
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /metrics
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "32Mi"
              cpu: "25m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: opnsense-exporter
  namespace: monitor
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    app.kubernetes.io/name: opnsense-exporter
spec:
  selector:
    app.kubernetes.io/name: opnsense-exporter
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: opnsense-exporter
  namespace: monitor
  annotations:
    argocd.argoproj.io/sync-wave: "21"
  labels:
    release: monitor
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: opnsense-exporter
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
      scrapeTimeout: 10s
