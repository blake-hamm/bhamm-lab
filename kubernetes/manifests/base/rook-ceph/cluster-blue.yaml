apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rook-ceph-cluster-blue
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: rook-ceph
    server: https://kubernetes.default.svc
  project: default
  source:
    chart: rook-ceph-cluster
    repoURL: https://charts.rook.io/release
    targetRevision: v1.16.3
    helm:
      valuesObject:
        # Namespace where the rook-ceph operator is deployed
        operatorNamespace: rook-ceph
        # The metadata.name of the CephCluster CR
        clusterName: rook-ceph-external
        # Cluster ceph.conf override
        configOverride: null
        # Disable toolbox for external cluster
        toolbox:
          enabled: false
        # Monitoring configuration for external cluster
        monitoring:
          enabled: true
          externalMgrEndpoints:
            - ip: 10.0.20.11
            - ip: 10.0.20.12
            - ip: 10.0.20.15
          externalMgrPrometheusPort: 9283
        # Ceph cluster specification for external mode
        cephClusterSpec:
          # External cluster configuration
          external:
            enable: true
          # Ceph version to use
          # cephVersion:
          #   image: quay.io/ceph/ceph:v19.2.3
          # Data directory on host nodes
          dataDirHostPath: /var/lib/rook
          # Disable crash collector for external cluster (no local daemons)
          crashCollector:
            disable: true
          # Disable dashboard for external cluster (managed by external Ceph)
          dashboard:
            enabled: false
          # Skip upgrade checks for external cluster
          skipUpgradeChecks: true
          # Health check configuration
          healthCheck:
            daemonHealth:
              mon:
                disabled: false
                interval: 45s
          # Disable all local storage configuration
          storage:
            useAllNodes: false
            useAllDevices: false
          # Network configuration
          network:
            connections:
              encryption:
                enabled: false
              compression:
                enabled: false
              requireMsgr2: true
        # CephBlockPool for RBD - k8s-blue-rbd
        cephBlockPools:
          - name: k8s-blue-rbd
            spec:
              failureDomain: host
              replicated:
                size: 3
              # Do NOT preserve pools on delete - enables kill switch cleanup
              parameters:
                size: "3"
                min_size: "2"
              enableRBDStats: true
            storageClass:
              enabled: true
              name: ceph-block
              isDefault: true
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: Immediate
              mountOptions: []
              parameters:
                imageFormat: "2"
                imageFeatures: layering
                # Rook-managed CSI secrets
                csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
                csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
                csi.storage.k8s.io/controller-publish-secret-name: rook-csi-rbd-provisioner
                csi.storage.k8s.io/controller-publish-secret-namespace: rook-ceph
                csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
                csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
                csi.storage.k8s.io/fstype: ext4
        # CephFileSystem for shared filesystem - k8s-blue-cephfs
        cephFileSystems:
          - name: k8s-blue-cephfs
            spec:
              metadataPool:
                failureDomain: host
                replicated:
                  size: 3
                parameters:
                  size: "3"
                  min_size: "2"
                enableRBDStats: true
              dataPools:
                - name: data
                  failureDomain: host
                  erasureCoded:
                    dataChunks: 2
                    codingChunks: 1
                  enableRBDStats: true
              metadataServer:
                activeCount: 1
                activeStandby: true
                resources:
                  limits:
                    memory: "4Gi"
                  requests:
                    cpu: "1000m"
                    memory: "4Gi"
                priorityClassName: system-cluster-critical
            storageClass:
              enabled: true
              name: ceph-filesystem
              isDefault: false
              reclaimPolicy: Delete
              allowVolumeExpansion: true
              volumeBindingMode: Immediate
              pool: data
              mountOptions: []
              parameters:
                # Rook-managed CSI secrets
                csi.storage.k8s.io/provisioner-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
                csi.storage.k8s.io/controller-expand-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
                csi.storage.k8s.io/controller-publish-secret-name: rook-csi-cephfs-provisioner
                csi.storage.k8s.io/controller-publish-secret-namespace: rook-ceph
                csi.storage.k8s.io/node-stage-secret-name: rook-csi-cephfs-node
                csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
                csi.storage.k8s.io/fstype: ext4
        # CephObjectStore for RGW S3 - rgw-blue
        cephObjectStores:
          - name: rgw-blue
            spec:
              # Metadata pool for object metadata
              metadataPool:
                failureDomain: host
                replicated:
                  size: 3
                parameters:
                  size: "3"
                  min_size: "2"
                enableRBDStats: true
              # Data pool for object data - use erasure coding for efficiency
              dataPool:
                failureDomain: host
                erasureCoded:
                  dataChunks: 2
                  codingChunks: 1
                enableRBDStats: true
              # Do NOT preserve pools on delete - enables kill switch cleanup
              preservePoolsOnDelete: false
              # RGW gateway configuration
              gateway:
                port: 80
                # securePort: 443  # Enable if using SSL
                instances: 2
                priorityClassName: system-cluster-critical
                resources:
                  limits:
                    memory: "2Gi"
                  requests:
                    cpu: "1000m"
                    memory: "1Gi"
        # Disable volume snapshot classes for now
        cephFileSystemVolumeSnapshotClass:
          enabled: false
        cephBlockPoolsVolumeSnapshotClass:
          enabled: false
        # CSI driver name prefix - use default (namespace)
        csiDriverNamePrefix: ""
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
    automated:
      prune: true
      selfHeal: true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
