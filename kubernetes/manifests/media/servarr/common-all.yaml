apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: servarr-common
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  destination:
    namespace: servarr
    server: https://kubernetes.default.svc
  project: default
  source:
    repoURL: https://github.com/blake-hamm/bhamm-lab.git
    targetRevision: main
    path: kubernetes/charts/common
    helm:
      valuesObject:
        name: servarr
        externalSecrets:
          enabled: true
          secrets:
            - secretKey: proton-wireguard-private-key
              remoteRef:
                key: /default/servarr
                property: proton-wireguard-private-key
        k8up:
          backup:
            enabled: true
            # ingressRoutes:
            #   - enabled: true
            #     name: test
            #     ingressClass: traefik-external
            #     # websocket: true
            #     routes:
            #       - kind: Rule
            #         match: Host(`test.bhamm-lab.com`)
            #         middlewares:
            #           - name: default-headers
            #         services:
            #           - name: test
            #             scheme: http
            #             port: 80
  syncPolicy:
    syncOptions:
      - ApplyOutOfSyncOnly=true
      - CreateNamespace=true
    automated:
      prune: true
      selfHeal: true
